bundle:
  name: review-summarizer

resources:
  jobs:
    review_summarizer_job:
      name: "[${bundle.target}] Review Summarizer"
      tasks:
        - task_key: run_notebook
          notebook_task:
            notebook_path: ./src/review_summarizer.py

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com

  prod:
    mode: production
    workspace:
      host: https://fe-vm-jdub-vm-serverless.cloud.databricks.com
      root_path: /Workspace/Users/jonathan.whiteley@databricks.com/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - level: CAN_MANAGE
        user_name: jonathan.whiteley@databricks.com
      - level: CAN_VIEW
        group_name: "users"
